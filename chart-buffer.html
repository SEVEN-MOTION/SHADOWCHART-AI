<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ShadowChart Engine Mirror</title>
  <style>
    html, body, #tradingview_canvas_container { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background: #131722; }
  </style>
</head>
<body>
  <div id="tradingview_canvas_container"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
  <script type="text/javascript">
    new TradingView.widget({
      "width": "100%",
      "height": "100%",
      "symbol": "BINANCE:BTCUSDT",
      "interval": "240",
      "timezone": "Exchange",
      "theme": "dark",
      "style": "1",
      "locale": "en",
      "enable_publishing": false,
      "hide_side_toolbar": true,
      "allow_symbol_change": false,
      "container_id": "tradingview_canvas_container",
      "studies": [
        "MAExp@tv-basicstudies",
        "RSI@tv-basicstudies",
        "VolumeProfile@tv-basicstudies"
      ]
    });
  </script>
</body>
</html>
