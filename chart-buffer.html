<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShadowChart AI Workspace Canvas</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            background-color: #0d0e12;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .chart-container {
            width: 100%;
            height: 50%;
            border-bottom: 2px solid #1e222d;
        }
        .chart-container:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div id="macro_anchor_4h" class="chart-container"></div>
    <div id="trigger_layer_1h" class="chart-container"></div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        const urlParams = new URLSearchParams(window.location.search);
        let activeSymbol = urlParams.get('symbol') || 'BTCUSDT';

        if (!activeSymbol.includes(':') && activeSymbol !== 'TOTAL') {
            activeSymbol = `BINANCE:${activeSymbol}`;
        }

        const standardConfig = {
            "autosize": true,
            "symbol": activeSymbol,
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "enable_publishing": false,
            "hide_side_toolbar": true,
            "allow_symbol_change": false,
            "show_popup_button": false,
            "withdate": false,
            "details": true,
            "studies": [
                "RSI@tv-basicstudies",
                "MASimple@tv-basicstudies"
            ]
        };

        new TradingView.widget({
            ...standardConfig,
            "container_id": "macro_anchor_4h",
            "interval": "240"
        });

        new TradingView.widget({
            ...standardConfig,
            "container_id": "trigger_layer_1h",
            "interval": "60"
        });
    </script>
</body>
</html>
